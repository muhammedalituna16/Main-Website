<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact - Lorenta Labs</title>

    <link rel="apple-touch-icon" sizes="180x180" href="../../images/favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="../../images/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="../../images/favicon/favicon-16x16.png">
    <link rel="manifest" href="../../images/favicon/site.webmanifest">
    <link rel="mask-icon" href="../../images/favicon/safari-pinned-tab.svg" color="#5bbad5">
    <link rel="shortcut icon" href="../../images/favicon/favicon.ico">
    <meta name="msapplication-TileColor" content="#da532c">
    <meta name="msapplication-config" content="../../images/favicon/browserconfig.xml">
    <meta name="theme-color" content="#ffffff">

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&display=swap"
      rel="stylesheet"
    />

    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        width: 100%;
        height: 100%;
        font-family: "Lato", sans-serif;
        background-color: #000000;
        color: #f3f4f6;
      }

      .hero-section-contact {
        background-image: url("../../images/img/youtube_cover.png");
        background-size: cover;
        background-position: center;
      }

      .bottom-image {
        width: 100%;
        max-width: 575px;
        position: fixed;
        bottom: -120px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 20;
        display: flex;
        align-items: flex-end;
        line-height: 0;
      }

      @media (min-width: 768px) {
        .bottom-image {
          width: 575px;
          bottom: 95px;
        }
      }
    </style>
  </head>
  <body class="antialiased">
<header class="absolute top-0 left-0 z-20 p-6">
  <a
    href="../../index.html"
    class="text-gray-200 font-semibold hover:text-white transition-colors"
  >
    Back to Home
  </a>
</header>

    <section
      class="relative h-96 flex items-center justify-center text-center hero-section-contact"
    >
      <div class="absolute inset-0 bg-black opacity-60"></div>
<div class="relative z-10 px-4 group">
  <h1
    id="email-copy"
    class="text-3xl sm:text-5xl md:text-7xl font-black text-white cursor-pointer transition-all duration-300 hover:opacity-80 active:scale-95"
    style="text-shadow: 0px 3px 15px rgba(0, 0, 0, 0.7);"
  >
    info@lorentalabs.com
  </h1>

  <div id="copy-feedback" class="flex items-center justify-center gap-2 mt-4 opacity-0 transition-all duration-500 translate-y-2">
    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-gray-400">
      <polyline points="20 6 9 17 4 12"></polyline>
    </svg>
    <span class="text-gray-400 text-xs tracking-[0.3em] uppercase font-light">
      Copied
    </span>
  </div>
</div>
    </section>


    <script>

        document.addEventListener("DOMContentLoaded", () => {
            const emailH1 = document.getElementById('email-copy');
            const feedback = document.getElementById('copy-feedback');

            if (emailH1) {
                emailH1.addEventListener('click', () => {
                    const email = emailH1.innerText;
                    
                    navigator.clipboard.writeText(email).then(() => {
                        feedback.classList.remove('opacity-0', 'translate-y-2');
                        feedback.classList.add('opacity-100', 'translate-y-0');

                        setTimeout(() => {
                            feedback.classList.add('opacity-0', 'translate-y-2');
                            feedback.classList.remove('opacity-100', 'translate-y-0');
                        }, 2000);
                    });
                });
            }
        });
    </script>
  </body>
</html>
